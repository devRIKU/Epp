<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        h1 {
            font-size: 3em;
            background: linear-gradient(90deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.3em;
            color: #aaa;
            max-width: 600px;
            text-align: center;
            line-height: 1.6;
        }
        .badge {
            margin-top: 30px;
            padding: 10px 28px;
            border-radius: 30px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 1em;
            color: #ffd200;
        }
    </style>
</head>
<body>
    <h1>E++ Language</h1>
    <p>Welcome to the E++ programming language, where code reads like plain English. This page was loaded from a local HTML file into an E++ webview window!</p>
    <div class="badge">Powered by E++ UI System</div>
</body>
</html>
